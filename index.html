<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Mis Tareas</h1>
      </header>

      <div class="add-task">
        <input type="text" id="taskInput" placeholder="Nueva tarea..." maxlength="200" />
        <input type="date" id="taskDate" />
        <button id="addBtn">Agregar</button>
      </div>

      <ul id="tasksList"></ul>
    </div>

    <script src="main.js"></script>
  </body>
</html>
